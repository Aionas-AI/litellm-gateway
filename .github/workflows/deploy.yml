name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for assuming the AWS deploy role
  contents: read

# Never run two deploys at once; queue the latest instead.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: key-manager/package-lock.json

      - name: key-manager tests + lint
        working-directory: key-manager
        run: |
          npm ci
          npm run lint
          npm test

      - name: alias-guard policy tests
        working-directory: litellm/extensions
        run: python3 -m unittest test_alias_policy -v

      - name: aionas-connect tests
        working-directory: aionas-connect
        run: python3 -m unittest test_aionas_connect -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Assume deploy role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Deploy over SSM
        env:
          INSTANCE_ID: ${{ secrets.GATEWAY_INSTANCE_ID }}
        run: |
          set -euo pipefail

          read -r -d '' DEPLOY_SCRIPT <<'SCRIPT' || true
          set -euo pipefail
          cd /opt/litellm-gateway
          git fetch origin master
          git reset --hard origin/master
          git log --oneline -1
          docker compose pull db caddy
          docker compose build --pull
          docker compose up -d
          # Wait for LiteLLM to come back healthy before declaring success.
          for i in $(seq 1 36); do
            STATE=$(docker inspect -f '{{.State.Health.Status}}' litellm-gateway-litellm-1 2>/dev/null || echo starting)
            [ "$STATE" = healthy ] && break
            sleep 5
          done
          [ "$STATE" = healthy ] || { echo "LiteLLM never became healthy"; docker compose logs --tail 50 litellm; exit 1; }
          # key-manager has no container healthcheck; give it time to boot.
          KM_OK=false
          for i in $(seq 1 12); do
            curl -sf http://127.0.0.1:9100/healthz && { KM_OK=true; break; }
            sleep 5
          done
          [ "$KM_OK" = true ] || { echo "key-manager never answered /healthz"; docker compose logs --tail 50 key-manager; exit 1; }
          echo
          docker compose ps --format '{{.Name}} {{.Status}}'
          docker image prune -f > /dev/null
          echo "DEPLOY OK"
          SCRIPT

          jq -n --arg script "$DEPLOY_SCRIPT" \
            '{commands: [$script], executionTimeout: ["900"]}' > params.json

          CID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "GitHub deploy ${GITHUB_SHA::7}" \
            --parameters file://params.json \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CID"

          STATUS=Pending
          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CID" \
              --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break;; esac
            sleep 10
          done

          echo "=== deploy output ==="
          aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text
          echo "=== deploy errors ==="
          aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" \
            --query StandardErrorContent --output text

          [ "$STATUS" = Success ] || { echo "Deploy finished with status: $STATUS"; exit 1; }
