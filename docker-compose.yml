services:
  litellm:
    build:
      context: .
      dockerfile: litellm/Dockerfile
    image: aionas/litellm-gateway:v1.92.0
    command: ["--config", "/config/config.yaml"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Required, no fallback: encrypts provider credentials in the DB. If it
      # silently defaulted to the master key, rotating the master key later
      # would make every stored credential undecryptable. Never rotate this.
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?LITELLM_SALT_KEY must be set - see .env.example}
      LITELLM_LICENSE: ${LITELLM_LICENSE:-}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@db:5432/litellm
      STORE_MODEL_IN_DB: "True"
      # Custom Admin UI logo (enterprise branding). Served by Caddy from webchat/.
      UI_LOGO_PATH: https://chat.${DOMAIN:-56.228.19.15.sslip.io}/aionas-logo.png
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  # Control plane for dynamic per-user BYOK enrollment. It talks to LiteLLM's
  # management API over the private Compose network; it never controls Docker.
  key-manager:
    build: ./key-manager
    environment:
      KEY_MANAGER_ADMIN_TOKEN: ${KEY_MANAGER_ADMIN_TOKEN}
      KEYADMIN_USER: ${KEYADMIN_USER:-admin}
      KEYADMIN_PASSWORD: ${KEYADMIN_PASSWORD}
      KEY_MANAGER_ENROLLMENT_SIGNING_KEY: ${KEY_MANAGER_ENROLLMENT_SIGNING_KEY}
      LITELLM_INTERNAL_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      PUBLIC_GATEWAY_URL: https://${DOMAIN}
      ALLOWED_CUSTOM_API_BASE_HOSTS: ${ALLOWED_CUSTOM_API_BASE_HOSTS:-}
    ports:
      - "127.0.0.1:9100:9100"
    depends_on:
      litellm:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      WEBCHAT_API_KEY: ${WEBCHAT_API_KEY:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./webchat:/srv/webchat:ro
      - ./keyadmin:/srv/keyadmin:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - litellm
      - key-manager
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pg_data:
