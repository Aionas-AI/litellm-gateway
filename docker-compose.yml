services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.91.1
    # Runtime config lives in ./runtime (seeded from config.yaml by bootstrap.sh,
    # regenerated by the key-manager service with per-tenant keys merged in).
    command: ["--config", "/runtime/config.yaml"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LICENSE: ${LITELLM_LICENSE:-}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@db:5432/litellm
      STORE_MODEL_IN_DB: "True"
      # Custom Admin UI logo (enterprise branding). Served by Caddy from webchat/.
      UI_LOGO_PATH: https://chat.${DOMAIN:-56.228.19.15.sslip.io}/aionas-logo.png
    volumes:
      - ./runtime:/runtime:ro
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Admin-only service managing per-tenant provider keys (AWS Secrets Manager)
  # and regenerating /runtime/config.yaml. Bound to localhost only — reach it
  # from the box or via SSM port-forward, never through Caddy.
  key-manager:
    build: ./key-manager
    environment:
      KEY_MANAGER_ADMIN_TOKEN: ${KEY_MANAGER_ADMIN_TOKEN}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      BASE_CONFIG_PATH: /base/config.yaml
      RUNTIME_CONFIG_PATH: /runtime/config.yaml
      LITELLM_CONTAINER: litellm-gateway-litellm-1
    volumes:
      - ./config.yaml:/base/config.yaml:ro
      - ./runtime:/runtime
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:9100:9100"
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      WEBCHAT_API_KEY: ${WEBCHAT_API_KEY:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./webchat:/srv/webchat:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - litellm
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pg_data:
