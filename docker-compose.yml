services:
  litellm:
    image: ghcr.io/berriai/litellm:v1.91.1
    command: ["--config", "/app/config.yaml"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LICENSE: ${LITELLM_LICENSE:-}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@db:5432/litellm
      STORE_MODEL_IN_DB: "True"
      # Custom Admin UI logo (enterprise branding). Served by Caddy from webchat/.
      UI_LOGO_PATH: https://chat.${DOMAIN:-56.228.19.15.sslip.io}/aionas-logo.png
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      WEBCHAT_API_KEY: ${WEBCHAT_API_KEY:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./webchat:/srv/webchat:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - litellm
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pg_data:
