<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aionas LLM Gateway</title>
    <style>
      :root {
        --bg: #0f1220;
        --panel: #171a2b;
        --border: #2a2f45;
        --text: #e7e9f3;
        --muted: #9aa0b8;
        --accent: #6366f1;
        --accent-hover: #7c7ff5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 600px at 50% -10%, #1c2140, var(--bg));
        color: var(--text);
        font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        padding: 32px 16px;
      }
      .app { width: 100%; max-width: 720px; }
      header { text-align: center; margin-bottom: 24px; }
      h1 { font-size: 22px; margin: 0 0 4px; }
      .sub { color: var(--muted); font-size: 13px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      }
      .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
      label { color: var(--muted); font-size: 13px; }
      select {
        background: #0f1220; color: var(--text); border: 1px solid var(--border);
        border-radius: 8px; padding: 7px 10px; font-size: 14px;
      }
      textarea {
        width: 100%; min-height: 90px; resize: vertical;
        background: #0f1220; color: var(--text);
        border: 1px solid var(--border); border-radius: 10px;
        padding: 12px; font-size: 15px; font-family: inherit;
      }
      textarea:focus, select:focus { outline: none; border-color: var(--accent); }
      .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
      button {
        background: var(--accent); color: white; border: 0;
        border-radius: 10px; padding: 10px 18px; font-size: 15px; font-weight: 600;
        cursor: pointer; transition: background 0.15s;
      }
      button:hover:not(:disabled) { background: var(--accent-hover); }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .hint { color: var(--muted); font-size: 12px; }
      .answer {
        margin-top: 18px; padding: 16px; border-radius: 12px;
        background: #0f1220; border: 1px solid var(--border);
        white-space: pre-wrap; word-wrap: break-word; min-height: 40px;
      }
      .answer.empty { color: var(--muted); }
      .meta { margin-top: 8px; color: var(--muted); font-size: 12px; text-align: right; }
      .spinner {
        display: inline-block; width: 15px; height: 15px; border: 2px solid var(--border);
        border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
        vertical-align: -2px; margin-right: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Aionas LLM Gateway</h1>
        <div class="sub">Ask a question — routed through the Aionas gateway</div>
      </header>
      <div class="card">
        <div class="row">
          <label for="model">Model</label>
          <select id="model">
            <option value="claude-opus">Claude Opus</option>
            <option value="claude-sonnet">Claude Sonnet</option>
          </select>
        </div>
        <textarea id="question" placeholder="Ask anything…" autofocus></textarea>
        <div class="actions">
          <span class="hint">Enter to send • Shift+Enter for a new line</span>
          <button id="ask">Ask</button>
        </div>
        <div id="answer" class="answer empty">The answer will appear here.</div>
        <div id="meta" class="meta"></div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const askBtn = $("ask");
      const questionEl = $("question");
      const answerEl = $("answer");
      const metaEl = $("meta");
      const modelEl = $("model");

      async function ask() {
        const question = questionEl.value.trim();
        if (!question) return;
        askBtn.disabled = true;
        metaEl.textContent = "";
        answerEl.classList.remove("empty");
        answerEl.innerHTML = '<span class="spinner"></span>Thinking…';

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: modelEl.value,
              messages: [{ role: "user", content: question }],
            }),
          });
          const data = await res.json();
          if (!res.ok) {
            answerEl.textContent = "Error: " + (data.error?.message || JSON.stringify(data));
            return;
          }
          answerEl.textContent = data.choices?.[0]?.message?.content ?? JSON.stringify(data);
          const u = data.usage;
          metaEl.textContent = u
            ? `${data.model} · ${u.prompt_tokens}+${u.completion_tokens} tokens`
            : data.model || "";
        } catch (e) {
          answerEl.textContent = "Request failed: " + e.message;
        } finally {
          askBtn.disabled = false;
        }
      }

      askBtn.addEventListener("click", ask);
      questionEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          ask();
        }
      });
    </script>
  </body>
</html>
